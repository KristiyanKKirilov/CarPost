@if(!isLoading){
    <div class="container">
        <div class="current-car">
            <div class="car-details">
                <main class="car-image">
                    <img [src]="car.firstImageUrl" alt="">
                    <div class="user-details">
                        <p class="center">
                            {{car.userId.username | slice : 15}} posted on {{car.createdAt | elapsedTime}}
                        </p>
                        <hr>           
                    </div>
                </main>
                <form  #form="ngForm" (ngSubmit)="editCar(form)">
                <aside class="car-info">
                    @if(errorMessage){
                        <div style="color: #d32f2f; margin-bottom: 15px; padding: 10px; background: #ffebee; border-radius: 4px;">
                            {{ errorMessage }}
                        </div>
                    }
                    <div class="brand-model-edit">
                        <p>
                            <label for="brand">Brand</label>
                            <select 
                            name="brand"
                            id="brand"
                            [(ngModel)]="car.brand"
                            #brand="ngModel"
                            [disabled]="isSaving"
                            required>
                                <option value="" disabled>Select a brand</option>
                                @for (b of brands; track $index) {
                                <option [value]="b.name">{{b.name}}</option>
                                }
                            </select>
                        </p>
                        <p>
                            <label for="model">Model</label>
                            <input type="text" 
                            name="model"
                            id="model"
                            [(ngModel)]="car.model"
                            #model="ngModel"
                            [disabled]="isSaving"
                            required>
                        </p>
                    </div>
                    <span></span>
                    <div class="edit-fields">

                    <p class="field">
                        <label for="firstImageUrl">Front image:</label>
                        <input 
                        type="text"
                        id="firstImageUrl"
                        name="firstImageUrl"
                        [(ngModel)]="car.firstImageUrl"
                        #firstImageUrl="ngModel"
                        [disabled]="isSaving"
                        required>
                    </p>
                    <p class="field">
                        <label for="secondImageUrl">Back image:</label>
                        <input 
                        type="text"
                        id="secondImageUrl"
                        name="secondImageUrl"
                        [(ngModel)]="car.secondImageUrl"
                        #secondImageUrl="ngModel"
                        [disabled]="isSaving"
                        required>
                    </p>
                    <p class="field">
                        <label for="year">Year:</label>
                        <input 
                        type="text"
                        id="year"
                        name="year"
                        [(ngModel)]="car.year"
                        #year="ngModel"
                        [disabled]="isSaving"
                        required>
                    </p>
                    <p class="field">
                        <label for="price">Price:</label>
                        <input 
                        type="number"
                        id="price"
                        name="price"
                        [(ngModel)]="car.price"
                        #price="ngModel"
                        [disabled]="isSaving"
                        required>
                    </p>
                    <p class="field">
                        <label for="city">City:</label>
                        <input 
                        type="text"
                        id="city"
                        name="city"
                        [(ngModel)]="car.city"
                        #city="ngModel"
                        [disabled]="isSaving"
                        required>
                    </p>
                    <p class="field">
                        <label for="engine">Engine:</label>
                        <select 
                        id="engine"
                        name="engine"
                        [(ngModel)]="car.engine"
                        #engine="ngModel"
                        [disabled]="isSaving"
                        required>
                            <option value="" disabled>Select engine type</option>
                            <option value="Diesel">Diesel</option>
                            <option value="Benzin">Benzin</option>
                            <option value="Gas">Gas</option>
                        </select>
                    </p>
                    <p class="field">
                        <label for="kilometers">Kilometers:</label>
                        <input 
                        type="number"
                        id="kilometers"
                        name="kilometers"
                        [(ngModel)]="car.kilometers"
                        #kilometers="ngModel"
                        [disabled]="isSaving"
                        required>
                    </p>
                    <p class="field">
                        <label for="gearbox">Gearbox:</label>
                        <select 
                        id="gearbox"
                        name="gearbox"
                        [(ngModel)]="car.gearbox"
                        #gearbox="ngModel"
                        [disabled]="isSaving"
                        required>
                            <option value="" disabled>Select gearbox type</option>
                            <option value="Manual">Manual</option>
                            <option value="Automatic">Automatic</option>
                        </select>
                    </p>
                    <p class="field">
                        <label for="color">Color:</label>
                        <input 
                        type="text"
                        id="color"
                        name="color"
                        [(ngModel)]="car.color"
                        #color="ngModel"
                        [disabled]="isSaving"
                        required>
                    </p>
                    <p class="field">
                        <label for="doors">Doors:</label>
                        <input 
                        type="number"
                        id="doors"
                        name="doors"
                        [(ngModel)]="car.doors"
                        #doors="ngModel"
                        [disabled]="isSaving"
                        required>
                    </p>
                    <button 
                    class="edit-btn"
                    [disabled]="form.invalid || isSaving"
                    [style]="{opacity: (form.invalid || isSaving) ? 0.4 : 0.9 }">{{ isSaving ? 'Saving...' : 'Edit' }}</button>
                </div>

                </aside>
            </form>

            </div>
            
        </div>
    </div>
}@else {
    <app-loader/>
}
